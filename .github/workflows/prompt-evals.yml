name: "NRC Math Vault Prompt Evaluations"

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    paths:
      - '.github/prompts/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Math Stability Audit
        run: |
          grep -i "TTT\|TUPT\|LWE" .github/prompts/
