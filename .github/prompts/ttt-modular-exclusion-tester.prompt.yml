name: "TTT Modular Exclusion Tester"
description: "Verifies the numerical stability of constants and indices against the Trageser Transformation Theorem (TTT). Checks for digital root exclusion in the Mod-9 group."
model: "openai/gpt-4o"
modelParameters:
  temperature: 0.0
variables:
  value_to_test: "The numerical value, constant, or index to audit for TTT-stability."
messages:
  - role: system
    content: "You are the NRC Mathematical Auditor. Your mission is to enforce the Trageser Transformation Theorem (TTT) and detect chaotic 3-6-9 attractor residues."
  - role: user
    content: |
      Perform a TTT Stability Audit for the following value: {{value_to_test}}

      Audit Protocol:
      1. Calculate the Digital Root (DR) of the value.
      2. Check if DR ∈ {3, 6, 9}.
      3. If DR is in {3, 6, 9}, mark as "CHAOTIC ZONE" and suggest a neighboring stable locus.
      4. If DR ∈ {1, 2, 4, 5, 7, 8}, mark as "STABLE / TTT-COMPLIANT".
      5. Explain the mathematical implication of this locus in a φ-scaled manifold.
