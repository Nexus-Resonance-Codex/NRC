site_name: NRC Central Math Vault
site_description: Professional Mathematical Primitives & Lattice Resonance Primes
site_author: James Trageser
site_url: https://Nexus-Resonance-Codex.github.io/NRC/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: grey
      accent: gold
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: grey
      accent: gold
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Math Playground: demos/math-playground.html
  - Algorithms:
      - TTT Modular Stability: proofs/index.md
  - Professional Links:
      - Resource Manifold: LINKS.md

plugins:
  - search
  - minify:
      minify_html: true
